<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>herdr web</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <script src="/assets/xterm.js"></script>
    <link rel="stylesheet" href="/assets/xterm.css" />
  </head>
  <body>
    <div id="app">
      <aside class="side">
        <div class="head">
          <strong>herdr web</strong
          ><button class="mini" id="themeToggle" title="Toggle theme">☾</button
          ><button class="mini" id="shortcutsToggle" title="Shortcuts">?</button
          ><button class="mini" id="settingsToggle" title="Settings">⚙</button
          ><button class="btn shell-action header-actions-button" id="headerActionsButton" title="Search and actions" aria-label="Search and actions"><span aria-hidden="true">⌕</span><span>Actions</span></button>
        </div>
        <div class="section">
          <div class="muted" id="versions">webui - · backend -</div>
          <div id="workspaces"></div>
          <div class="section-header">Agents</div>
          <div id="agents"></div>
        </div>
      </aside>
      <button class="sidebar-toggle" id="sidebarToggle" title="Hide sidebar" aria-label="Hide sidebar">‹</button>
      <main class="main">
        <div class="tabs" id="tabs"></div>
        <section class="project-dashboard" id="projectDashboard" hidden></section>
        <div class="terminal-shell" id="terminalShell">
          <div class="terminal-loading" id="terminalLoading">
            <span>Loading panel</span>
          </div>
          <button class="terminal-follow-button" id="terminalFollowButton" type="button" hidden title="Go to latest terminal output and resume follow" aria-label="Go to latest terminal output and resume follow">↓ Tail</button>
          <div class="terminal" id="terminal"></div>
        </div>
      </main>
    </div>
    <div class="context-menu" id="clipboardMenu">
      <button id="copyMenu">Copy</button><button id="pasteMenu">Paste</button>
    </div>
    <div class="shortcut-prefix-overlay" id="shortcutPrefixOverlay" hidden>
      <div class="shortcut-prefix-card">
        <strong>Shortcut prefix active</strong>
        <span>Press shortcut key. Esc cancels.</span>
        <kbd id="shortcutPrefixKey">Ctrl+B</kbd>
      </div>
    </div>
    <div class="modal-backdrop search-palette" id="searchPalette">
      <div class="modal search-modal">
        <div class="search-head">
          <span class="search-icon">⌕</span>
          <input id="searchPaletteInput" placeholder="Search workspaces, files, folders, or file contents..." autocomplete="off" />
          <button class="mini settings-close" id="searchPaletteClose" title="Close">✕</button>
        </div>
        <div class="search-results" id="searchPaletteResults"></div>
        <div class="search-help">Enter opens selection · ↑/↓ moves · Alt+F files · Alt+D folders · Esc closes</div>
      </div>
    </div>
    <div class="modal-backdrop" id="settingsModal">
      <div class="modal">
        <h2>Settings</h2>
        <label class="option"
          ><span
            >Default theme<small
              >Auto follows browser/system theme; if unavailable it uses
              light.</small
            ></span
          ><select class="settings-select" id="optTheme">
            <option value="auto">Auto</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select></label
        ><label class="option"
          ><input type="checkbox" id="optOverflow" /><span
            >Show terminal overflow scrollbars<small
              >Keep backend terminal size and use browser scrollbars when it
              overflows.</small
            ></span
          ></label
        ><label class="option"
          ><input type="checkbox" id="optFit" /><span
            >Resize terminal to browser viewport<small
              >Ask Herdr to use browser-sized terminal dimensions instead of
              pane layout size.</small
            ></span
          ></label
        ><label class="option"
          ><input type="checkbox" id="optShiftEnterNewline" /><span
            >Shift+Enter inserts newline<small
              >Intercept browser Shift+Enter and send OpenCode newline
              input.</small
            ></span
          ></label
        ><label class="option"
          ><input type="checkbox" id="optSound" /><span
            >Agent attention sounds<small
              >Play a browser sound when an agent needs attention.</small
            ></span
          ></label
        ><label class="option"
          ><input type="checkbox" id="optBrowserNotifications" /><span
            >Browser notifications<small
              >Ask this browser to show system notifications when an agent needs attention.</small
            ></span
          ></label
        >
        <div class="modal-actions">
          <button class="btn" id="settingsClose">Close</button>
        </div>
      </div>
    </div>
    <div class="modal-backdrop temp-terminal-backdrop" id="tempTerminalModal">
      <div class="temp-terminal-modal" role="dialog" aria-modal="true" aria-labelledby="tempTerminalTitle">
        <div class="temp-terminal-head">
          <h2 id="tempTerminalTitle">Temporary terminal</h2>
          <div class="temp-terminal-head-actions">
            <span class="temp-terminal-hint">Input captured · Ctrl+G detaches</span>
            <button class="temp-terminal-close" id="tempTerminalClose" title="Detach temporary terminal" aria-label="Detach temporary terminal">✕</button>
          </div>
        </div>
        <div class="temp-terminal-body">
          <div class="terminal" id="tempTerminal"></div>
        </div>
      </div>
    </div>
    <script src="/assets/app-boot.js"></script>
  </body>
</html>
