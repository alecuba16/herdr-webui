<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>herdr web login</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/assets/login.css" />
  </head>
  <body>
    <form id="login">
      <div class="brand">
        <img src="/favicon.svg" alt="" />
        <div><strong>Herdr</strong><span>WebUI</span></div>
      </div>
      <input name="username" autocomplete="username" placeholder="user" /><input
        name="password"
        type="password"
        autocomplete="current-password"
        placeholder="password"
      /><button>Login</button>
      <p id="error"></p>
    </form>
    <script src="/assets/login.js"></script>
  </body>
</html>
