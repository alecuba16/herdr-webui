name: WebUI CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Build and test
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: webui -> ../target

      - name: Format check
        run: cargo fmt --manifest-path webui/Cargo.toml --check

      - name: Check
        run: cargo check --manifest-path webui/Cargo.toml --target-dir target

      - name: Test
        run: cargo test --manifest-path webui/Cargo.toml --target-dir target

      - name: Build release
        run: cargo build --release --manifest-path webui/Cargo.toml --target-dir target

      - name: Version contains commit hash
        run: |
          short_sha="${GITHUB_SHA::12}"
          if [ "$GITHUB_REF_NAME" = "main" ] || [ "$GITHUB_REF_NAME" = "master" ]; then
            expected="${GITHUB_REF_NAME}-${short_sha}"
          else
            expected="snapshot-${short_sha}"
          fi
          version="$(target/release/herdr-webui --version)"
          echo "version=$version"
          test "$version" = "$expected"
