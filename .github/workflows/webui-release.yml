name: WebUI Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS ${{ matrix.target }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            artifact: herdr-webui-macos-aarch64
          - target: x86_64-apple-darwin
            artifact: herdr-webui-macos-x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate SemVer tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must be vMAJOR.MINOR.PATCH"
            exit 1
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: webui -> ../target

      - name: Test
        run: cargo test --manifest-path webui/Cargo.toml --target-dir target

      - name: Build release
        run: cargo build --release --manifest-path webui/Cargo.toml --target-dir target --target ${{ matrix.target }}

      - name: Verify release version
        run: |
          if [ "${{ matrix.target }}" = "$(rustc -vV | sed -n 's/^host: //p')" ]; then
            actual="$(target/${{ matrix.target }}/release/herdr-webui --version)"
            echo "version=$actual"
            test "$actual" = "$GITHUB_REF_NAME"
          fi

      - name: Package
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          cp target/${{ matrix.target }}/release/herdr-webui dist/${{ matrix.artifact }}/herdr-webui
          chmod 755 dist/${{ matrix.artifact }}/herdr-webui
          cat > dist/${{ matrix.artifact }}/README.txt <<'EOF'
          Install:
            ./herdr-webui install-mac

          Update existing LaunchAgent install:
            ./herdr-webui update-mac

          Uninstall LaunchAgent:
            ./herdr-webui uninstall-mac
          EOF
          tar -C dist -czf dist/${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}
          shasum -a 256 dist/${{ matrix.artifact }}.tar.gz > dist/${{ matrix.artifact }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}.tar.gz
            dist/${{ matrix.artifact }}.tar.gz.sha256

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build-macos
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Herdr WebUI ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.sha256
