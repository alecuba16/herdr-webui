name: Cleanup Runs and Releases

# One-time maintenance workflow; safe to remove after cleanup.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/cleanup-runs-and-releases.yml

permissions:
  actions: write
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old workflow runs (keep latest per workflow)
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const currentRunId = context.runId;
            const runs = [];
            let page = 1;

            while (true) {
              const response = await github.rest.actions.listWorkflowRunsForRepo({
                owner,
                repo,
                per_page: 100,
                page,
              });
              runs.push(...response.data.workflow_runs);
              if (response.data.workflow_runs.length < 100) break;
              page += 1;
            }

            const latestByWorkflow = new Map();
            for (const run of runs) {
              const current = latestByWorkflow.get(run.workflow_id);
              if (!current || new Date(run.created_at) > new Date(current.created_at)) {
                latestByWorkflow.set(run.workflow_id, run);
              }
            }

            const keepIds = new Set([...latestByWorkflow.values()].map((run) => run.id));
            const toDelete = runs.filter((run) => !keepIds.has(run.id));
            const nonDeletableStatuses = new Set([
              "in_progress",
              "queued",
              "waiting",
              "requested",
              "pending",
            ]);
            const deletableStatuses = new Set([
              "completed",
              "failure",
              "cancelled",
              "skipped",
              "stale",
              "timed_out",
              "action_required",
              "neutral",
              "startup_failure",
            ]);

            let deleted = 0;
            let skipped = 0;
            let failed = 0;

            core.info(
              `Runs: ${runs.length} total, keeping ${keepIds.size}, attempting ${toDelete.length} deletions`
            );

            for (const run of toDelete) {
              if (run.id === currentRunId) {
                core.info(`Skipping current run ${run.id}`);
                skipped += 1;
                continue;
              }

              if (nonDeletableStatuses.has(run.status) || !deletableStatuses.has(run.status)) {
                core.warning(
                  `Skipping ${run.id} (${run.name}) because status is ${run.status}`
                );
                skipped += 1;
                continue;
              }

              try {
                await github.rest.actions.deleteWorkflowRun({
                  owner,
                  repo,
                  run_id: run.id,
                });
                deleted += 1;
              } catch (error) {
                failed += 1;
                core.warning(`Failed to delete run ${run.id} (${run.name}): ${error.message}`);
              }
            }

            core.info(`Run cleanup finished: deleted=${deleted}, skipped=${skipped}, failed=${failed}`);

      - name: Delete old releases (keep latest by date)
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const releases = [];
            let page = 1;

            while (true) {
              const response = await github.rest.repos.listReleases({
                owner,
                repo,
                per_page: 100,
                page,
              });
              releases.push(...response.data);
              if (response.data.length < 100) break;
              page += 1;
            }

            if (releases.length <= 1) {
              core.info(`Releases: ${releases.length} total, nothing to delete`);
              return;
            }

            releases.sort((a, b) => {
              const aDate = new Date(a.published_at || a.created_at);
              const bDate = new Date(b.published_at || b.created_at);
              return bDate - aDate;
            });

            const keep = releases[0];
            const toDelete = releases.slice(1);
            let deleted = 0;
            let failed = 0;

            core.info(
              `Releases: ${releases.length} total, keeping ${keep.tag_name}, deleting ${toDelete.length}`
            );

            for (const release of toDelete) {
              try {
                await github.rest.repos.deleteRelease({
                  owner,
                  repo,
                  release_id: release.id,
                });
                deleted += 1;
              } catch (error) {
                failed += 1;
                core.warning(
                  `Failed to delete release ${release.tag_name}: ${error.message}`
                );
              }
            }

            core.info(`Release cleanup finished: deleted=${deleted}, failed=${failed}`);
